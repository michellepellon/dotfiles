# ABOUTME: Catppuccin Mocha theme for tmux status bar and pane borders.
# ABOUTME: Matches the Ghostty terminal theme for a cohesive look.

# ─── Catppuccin Mocha Palette ────────────────────────────────────────────
# base:     #1e1e2e    surface0: #313244    surface1: #45475a
# text:     #cdd6f4    subtext0: #a6adc8    overlay0: #6c7086
# blue:     #89b4fa    green:    #a6e3a1    mauve:    #cba6f7
# red:      #f38ba8    peach:    #fab387    yellow:   #f9e2af
# lavender: #b4befe    teal:     #94e2d5    rosewater:#f5e0dc

# ─── Status Bar ──────────────────────────────────────────────────────────
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-interval 15
set -g status-left-length 40
set -g status-right-length 80
set -g status-justify absolute-centre

set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e,nobold] "
set -g status-right "#[fg=#a6adc8] %Y-%m-%d #[fg=#89b4fa]%H:%M "

# ─── Window Status ───────────────────────────────────────────────────────
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#a6e3a1,bold] #I:#W #[fg=#a6e3a1,bg=#1e1e2e,nobold]"
setw -g window-status-separator ""

# ─── Pane Borders ────────────────────────────────────────────────────────
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ─── Messages & Copy Mode ───────────────────────────────────────────────
set -g message-style "bg=#313244,fg=#cdd6f4"
setw -g mode-style "bg=#45475a,fg=#cdd6f4"
setw -g clock-mode-colour "#89b4fa"

# ─── Bells ───────────────────────────────────────────────────────────────
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none
