# ABOUTME: Keybindings for tmux — vi-style navigation, intuitive splits, clipboard.
# ABOUTME: Designed for macOS + Ghostty with pbcopy clipboard integration.

# ─── Config Reload ───────────────────────────────────────────────────────
bind r source-file "~/.config/tmux/tmux.conf" \; display-message "Config reloaded"

# ─── Splits ──────────────────────────────────────────────────────────────
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ─── Pane Navigation (vi-style) ─────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Pane Resize (prefix + Ctrl-hjkl) ───────────────────────────────────
bind C-h resize-pane -L 5
bind C-j resize-pane -D 5
bind C-k resize-pane -U 5
bind C-l resize-pane -R 5

# ─── Pane Management ────────────────────────────────────────────────────
bind X kill-pane
bind tab select-pane -t :.+

# ─── Window Navigation ──────────────────────────────────────────────────
# Alt+number for no-prefix fast switching
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9
bind -n M-n new-window -c "#{pane_current_path}"

# Window reordering
bind < swap-window -t -1 \; select-window -t -1
bind > swap-window -t +1 \; select-window -t +1

# Window/session browsing
bind w choose-tree
bind s choose-session
bind A command-prompt -I "#W" "rename-window '%%'"
bind $ command-prompt -I "#S" "rename-session '%%'"

# ─── Copy Mode ───────────────────────────────────────────────────────────
# Alt+/ to enter copy mode (no prefix needed)
bind -n M-/ copy-mode

# PageUp enters copy mode and scrolls up
bind -n Pageup copy-mode -u
bind -T copy-mode-vi Pagedown send-keys -X page-down
bind -T copy-mode-vi Pageup send-keys -X page-up

# Vi-style selection and yank
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi r send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ─── Shift+Enter Fix (Claude Code multi-line input) ─────────────────────
bind -T root S-Enter send-keys C-j

# ─── Help ────────────────────────────────────────────────────────────────
bind ? list-keys
bind : command-prompt
