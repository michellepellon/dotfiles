# ABOUTME: Main tmux configuration — sets core options and sources modular configs.
# ABOUTME: Expects theme.conf and keybindings.conf alongside this file.

# ─── Prefix ──────────────────────────────────────────────────────────────
# C-Space avoids readline conflict (C-a = beginning of line, C-b = back char)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ─── General ─────────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 20000
set -g escape-time 0
set -g focus-events on
set -g exit-empty off
setw -g aggressive-resize on

# Vi mode for copy and command prompt
set -g mode-keys vi
set -g status-keys vi

# ─── Terminal / Truecolor / Ghostty ──────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,screen-256color:RGB,ghostty:RGB,tmux-256color:RGB"
set -g set-clipboard on

# ─── Indexing ────────────────────────────────────────────────────────────
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ─── Window Titles ───────────────────────────────────────────────────────
set -g set-titles on
set -g set-titles-string '#S:#W [#I.#P]'
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

# ─── SSH Agent Forwarding ────────────────────────────────────────────────
set -g update-environment "SSH_AUTH_SOCK SSH_AGENT_PID SSH_ASKPASS SSH_CONNECTION"

# ─── Scrollbars (tmux 3.5+) ─────────────────────────────────────────────
set -g pane-scrollbars on

# ─── Modular Config ─────────────────────────────────────────────────────
source-file "~/.config/tmux/theme.conf"
source-file "~/.config/tmux/keybindings.conf"
